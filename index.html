<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1014">
<title>QUICK DJ</title>
<style>
:root{
  --text:#f6f7f9;
  --muted:#98a1ad;
  --accent:#ef5757;
  --ok:#7de0a1;
  --line:rgba(255,255,255,.08);
  --shadow:0 14px 34px rgba(0,0,0,.36);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(circle at 30% 10%, #1c222b 0%, #11151a 48%, #090b0e 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body{touch-action:manipulation}
button,input{font:inherit}
#app{
  width:100vw;height:100vh;padding:
  max(8px, env(safe-area-inset-top))
  max(8px, env(safe-area-inset-right))
  max(8px, env(safe-area-inset-bottom))
  max(8px, env(safe-area-inset-left));
  display:flex;flex-direction:column;gap:10px;
}
.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
#top{
  flex:0 0 66%;
  min-height:0;
  display:grid;
  grid-template-columns:64fr 36fr;
  gap:10px;
}
#disc-area{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding-left:min(2.2vw, 16px);
  background:radial-gradient(circle at 45% 45%, #1d232c 0%, #14181e 58%, #0f1216 100%);
}
.disc-wrap{
  width:min(98%, calc(100vh * .56), calc(100vw * .58));
  aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
}
#disc{
  width:100%;height:100%;
  border-radius:50%;
  background-image:url("https://lh3.googleusercontent.com/d/11t6JbUXtU0C7Orlgx3Jbo_UYZq8JZW2u");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  box-shadow:0 16px 42px rgba(0,0,0,.40);
  touch-action:none; user-select:none;
  transform:rotate(0deg);
  will-change:transform;
}
.pill{
  position:absolute;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  font-size:clamp(11px, 1.6vh, 15px);
  letter-spacing:.08em;
  white-space:nowrap;
}
#disc-status{left:12px;bottom:12px}
#disc-play-state{right:12px;bottom:12px}
#control-area{
  padding:12px;
  display:grid;
  grid-template-rows:auto auto auto auto auto 1fr;
  gap:10px;
  align-content:start;
}
.title{
  font-size:clamp(13px, 1.8vh, 18px);
  color:#d6dbe2;
  letter-spacing:.12em;
}
button.ctrl{
  min-height:54px;
  border:none;
  border-radius:18px;
  color:var(--text);
  background:linear-gradient(180deg, #2b313a, #1a1f26);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 8px 18px rgba(0,0,0,.22);
}
button.ctrl:active{transform:translateY(1px)}
button.ctrl[disabled]{opacity:.45}
button.rec.active{
  background:linear-gradient(180deg, #863737, #561f1f);
  border-color:rgba(255,120,120,.28);
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slider-wrap{
  padding:10px 12px 12px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border-radius:18px;
}
.slider-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:clamp(11px, 1.5vh, 14px);
  color:#d6dbe2;
  margin-bottom:8px;
  letter-spacing:.08em;
}
input[type="range"]{
  appearance:none;-webkit-appearance:none;
  width:100%;height:34px;background:transparent;margin:0;
}
input[type="range"]::-webkit-slider-runnable-track{
  height:8px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-moz-range-track{
  height:8px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:24px;height:24px;border-radius:50%;
  margin-top:-8px;background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
input[type="range"]::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;
  background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.small{
  font-size:clamp(11px, 1.45vh, 13px);
  color:var(--muted);
  line-height:1.45;
}
#piano-area{
  flex:1;
  min-height:0;
  position:relative;
  display:grid;
  grid-template-rows:auto 1fr;
  padding:6px 8px 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
    radial-gradient(circle at 50% 0%, #1c232d 0%, #14191f 60%, #0f1217 100%);
}
#piano-status{
  justify-self:start;
  margin-bottom:2px;
  padding:4px 8px;
  font-size:clamp(10px,1.3vh,13px);
  color:#d7dde5;
  letter-spacing:.08em;
}
#keys{
  position:relative;
  width:100%;
  height:100%;
  min-height:0;
}
#white-keys{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
}
.white-key{
  border:none;
  border-radius:0 0 10px 10px;
  background:linear-gradient(180deg,#ffffff 0%,#f2f4f6 62%,#dce2e8 100%);
  box-shadow:inset 0 -10px 14px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.7);
  min-width:0;
}
.white-key:active,.white-key.active{
  background:linear-gradient(180deg,#eceff3 0%,#d4dbe3 100%);
}
.dot{
  display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--muted);margin-right:8px;
}
.dot.ok{background:var(--ok)}
.dot.rec{background:var(--accent); box-shadow:0 0 12px rgba(239,87,87,.58)}
#boot{
  position:fixed;inset:0;z-index:30;
  background:linear-gradient(180deg, rgba(8,10,13,.94), rgba(8,10,13,.97));
  display:flex;align-items:center;justify-content:center;
  padding:18px;
}
.boot-card{
  width:min(560px, 100%);
  border-radius:24px;
  padding:20px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  box-shadow:0 20px 46px rgba(0,0,0,.36);
}
.boot-title{font-size:clamp(26px, 4vw, 36px);letter-spacing:.1em;margin-bottom:10px}
.boot-copy{font-size:clamp(14px, 2vw, 18px);line-height:1.6;color:#e3e7ec}
.boot-copy p{margin:.2em 0}
#start-btn{
  width:100%;margin-top:16px;min-height:58px;border:none;border-radius:18px;
  font-size:18px;font-weight:700;letter-spacing:.08em;color:#fff;
  background:linear-gradient(180deg,#3b82f6,#2559b7);
  box-shadow:0 12px 28px rgba(37,89,183,.35);
}
#toast{
  position:fixed;left:50%;top:14px;transform:translateX(-50%);
  z-index:40;padding:10px 14px;border-radius:999px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);
  font-size:14px;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .18s;
}
#toast.show{opacity:1}
@media (max-width: 900px){
  #top{grid-template-columns:61fr 39fr}
  #control-area{padding:10px}
  button.ctrl{min-height:50px}
  .slider-wrap{padding:8px 10px 10px}
  #disc-area{padding-left:10px}
  .disc-wrap{width:min(99%, calc(100vh * .53), calc(100vw * .60))}
}
@media (max-height: 520px){
  #app{gap:8px}
  #top{flex-basis:64%}
  button.ctrl{min-height:46px}
}
</style>
</head>
<body>
<div id="app">
  <section id="top">
    <div id="disc-area" class="panel">
      <div class="disc-wrap">
        <div id="disc" aria-label="record"></div>
      </div>
      <div id="disc-status" class="pill"><span class="dot"></span>DISC EMPTY</div>
      <div id="disc-play-state" class="pill">STOPPED</div>
    </div>
    <aside id="control-area" class="panel">
      <div class="title">QUICK DJ</div>
      <button id="btn-disc-rec" class="ctrl rec">DISC REC</button>
      <div class="row">
        <button id="btn-disc-play" class="ctrl">DISC PLAY</button>
        <button id="btn-disc-stop" class="ctrl">DISC STOP</button>
      </div>
      <div class="slider-wrap">
        <div class="slider-head"><span>DISC VOL</span><span id="disc-vol-value">50%</span></div>
        <input id="disc-vol" type="range" min="0" max="100" value="50">
      </div>
      <button id="btn-piano-rec" class="ctrl rec">PIANO REC</button>
      <div class="slider-wrap">
        <div class="slider-head"><span>PIANO VOL</span><span id="piano-vol-value">50%</span></div>
        <input id="piano-vol" type="range" min="0" max="100" value="50">
      </div>
      <div class="small">DISC は最大10秒、PIANO は最大3秒まで録音できます。</div>
    </aside>
  </section>

  <section id="piano-area" class="panel">
    <div id="piano-status">PIANO EMPTY</div>
    <div id="keys">
      <div id="white-keys"></div>
    </div>
  </section>
</div>

<div id="boot">
  <div class="boot-card">
    <div class="boot-title">QUICK DJ</div>
    <div class="boot-copy">
      <p>ディスクとピアノをそれぞれ録音して、誰でも簡単DJ体験！</p>
      <p>録音がうまくいかない場合は、ブラウザの設定を見直してください。</p>
    </div>
    <button id="start-btn">START</button>
  </div>
</div>

<div id="toast"></div>

<script>
const DISC_MAX_MS = 10000;
const PIANO_MAX_MS = 3000;
const WHITE_NOTES = [
  {name:"C", semitone:0},
  {name:"D", semitone:2},
  {name:"E", semitone:4},
  {name:"F", semitone:5},
  {name:"G", semitone:7},
  {name:"A", semitone:9},
  {name:"B", semitone:11},
  {name:"C5", semitone:12},
];

const state = {
  audioCtx: null,
  micStream: null,
  mediaRecorder: null,
  mediaChunks: [],
  recordTimer: null,
  activeTarget: null,
  recordStopAt: 0,

  discBuffer: null,
  pianoBuffer: null,

  discBus: null,
  discLoopGain: null,
  discScratchGain: null,
  pianoBus: null,

  discVol: 0.50,
  pianoVol: 0.50,

  discPlaying: false,
  discLoopSource: null,
  discLoopStartTime: 0,
  discPausedOffset: 0,

  scratching: false,
  scratchPointerId: null,
  scratchPrevAngle: 0,
  scratchPos: 0,
  scratchBurstAt: 0,
  activeScratchSources: new Set(),

  visualRotation: 0,
  spinRaf: 0,
  lastSpinTs: 0
};

const el = {
  disc: document.getElementById('disc'),
  discStatus: document.getElementById('disc-status'),
  discPlayState: document.getElementById('disc-play-state'),
  pianoStatus: document.getElementById('piano-status'),
  btnDiscRec: document.getElementById('btn-disc-rec'),
  btnDiscPlay: document.getElementById('btn-disc-play'),
  btnDiscStop: document.getElementById('btn-disc-stop'),
  btnPianoRec: document.getElementById('btn-piano-rec'),
  discVol: document.getElementById('disc-vol'),
  discVolValue: document.getElementById('disc-vol-value'),
  pianoVol: document.getElementById('piano-vol'),
  pianoVolValue: document.getElementById('piano-vol-value'),
  whiteKeys: document.getElementById('white-keys'),
  boot: document.getElementById('boot'),
  startBtn: document.getElementById('start-btn'),
  toast: document.getElementById('toast')
};

function showToast(msg){
  el.toast.textContent = msg;
  el.toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>el.toast.classList.remove('show'), 1800);
}
function wrap(v, max){
  if (!max || max <= 0) return 0;
  return ((v % max) + max) % max;
}
function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
function normalizeAngleDelta(d){
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}
function formatRecButton(target, remainSec){
  const n = Math.max(0, remainSec).toFixed(1);
  return target === 'disc' ? `DISC REC ${n}` : `PIANO REC ${n}`;
}
function pickMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/mp4',
    'audio/webm',
    'audio/ogg;codecs=opus'
  ];
  for (const type of candidates) {
    try {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) return type;
    } catch {}
  }
  return '';
}
async function ensureAudio(){
  if (!state.audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new Ctx({ latencyHint: 'interactive' });

    state.discBus = state.audioCtx.createGain();
    state.discLoopGain = state.audioCtx.createGain();
    state.discScratchGain = state.audioCtx.createGain();
    state.pianoBus = state.audioCtx.createGain();
    const comp = state.audioCtx.createDynamicsCompressor();

    comp.threshold.value = -18;
    comp.knee.value = 18;
    comp.ratio.value = 3;
    comp.attack.value = 0.003;
    comp.release.value = 0.15;

    state.discBus.gain.value = state.discVol;
    state.discLoopGain.gain.value = 1.0;
    state.discScratchGain.gain.value = 1.0;
    state.pianoBus.gain.value = state.pianoVol;

    state.discLoopGain.connect(state.discBus);
    state.discScratchGain.connect(state.discBus);
    state.discBus.connect(comp);
    state.pianoBus.connect(comp);
    comp.connect(state.audioCtx.destination);
  }
  if (state.audioCtx.state !== 'running') await state.audioCtx.resume();
}
async function prepareMic() {
  if (state.micStream) return;
  if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder)) {
    throw new Error('このブラウザでは録音に対応していません。');
  }
  state.micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
  });
}
async function blobToAudioBuffer(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  return await state.audioCtx.decodeAudioData(arrayBuffer.slice(0));
}
function toMonoBuffer(buffer) {
  if (buffer.numberOfChannels === 1) return buffer;
  const mono = state.audioCtx.createBuffer(1, buffer.length, buffer.sampleRate);
  const out = mono.getChannelData(0);
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < data.length; i++) out[i] += data[i] / buffer.numberOfChannels;
  }
  return mono;
}
function analyzePeak(buffer){
  let peak = 0;
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const a = Math.abs(data[i]);
    if (a > peak) peak = a;
  }
  return peak;
}
function normalizeBufferSmart(buffer, targetPeak = 0.84, maxBoost = 4.0){
  const peak = analyzePeak(buffer);
  if (peak <= 0.00001) return buffer;
  const gain = clamp(targetPeak / peak, 1.0, maxBoost);
  if (gain <= 1.01) return buffer;
  const out = state.audioCtx.createBuffer(1, buffer.length, buffer.sampleRate);
  const src = buffer.getChannelData(0);
  const dst = out.getChannelData(0);
  for (let i = 0; i < src.length; i++) dst[i] = clamp(src[i] * gain, -0.99, 0.99);
  return out;
}
function cleanupScratchSources(){
  for (const src of Array.from(state.activeScratchSources)) {
    try { src.stop(); } catch {}
    try { src.disconnect(); } catch {}
    state.activeScratchSources.delete(src);
  }
}
function resetRecordButtons(){
  el.btnDiscRec.textContent = 'DISC REC';
  el.btnPianoRec.textContent = 'PIANO REC';
  el.btnDiscRec.classList.remove('active');
  el.btnPianoRec.classList.remove('active');
}
function updateRecButtons(){
  resetRecordButtons();
  if (!state.activeTarget) return;
  const remainMs = Math.max(0, state.recordStopAt - performance.now());
  const remainSec = remainMs / 1000;
  if (state.activeTarget === 'disc') {
    el.btnDiscRec.textContent = formatRecButton('disc', remainSec);
    el.btnDiscRec.classList.add('active');
  } else if (state.activeTarget === 'piano') {
    el.btnPianoRec.textContent = formatRecButton('piano', remainSec);
    el.btnPianoRec.classList.add('active');
  }
}
function renderStatus() {
  let discText = 'DISC EMPTY';
  let discDot = '';
  if (state.activeTarget === 'disc') {
    discText = 'DISC RECORDING';
    discDot = 'rec';
  } else if (state.discBuffer) {
    discText = 'DISC READY';
    discDot = 'ok';
  }
  el.discStatus.innerHTML = `<span class="dot ${discDot}"></span>${discText}`;

  if (state.activeTarget === 'piano') {
    el.pianoStatus.innerHTML = '<span class="dot rec"></span>PIANO RECORDING';
  } else if (state.pianoBuffer) {
    el.pianoStatus.innerHTML = '<span class="dot ok"></span>PIANO READY';
  } else {
    el.pianoStatus.textContent = 'PIANO EMPTY';
  }

  if (state.scratching) el.discPlayState.textContent = 'SCRATCH';
  else if (state.discPlaying) el.discPlayState.textContent = 'PLAYING';
  else el.discPlayState.textContent = 'STOPPED';

  updateRecButtons();
  el.btnDiscPlay.disabled = !state.discBuffer || !!state.activeTarget;
  el.btnDiscStop.disabled = !state.discBuffer || !!state.activeTarget;
  el.btnDiscRec.disabled = state.activeTarget === 'piano';
  el.btnPianoRec.disabled = state.activeTarget === 'disc';
}
async function startRecording(target) {
  await ensureAudio();
  await prepareMic();
  stopRecording(true);
  stopDiscScratchOnly();
  if (target === 'disc') stopDiscPlayback();
  state.mediaChunks = [];
  state.activeTarget = target;
  const maxMs = target === 'disc' ? DISC_MAX_MS : PIANO_MAX_MS;
  const mimeType = pickMimeType();
  const recorder = mimeType ? new MediaRecorder(state.micStream, { mimeType }) : new MediaRecorder(state.micStream);
  state.mediaRecorder = recorder;
  const recordTarget = target;
  recorder.addEventListener('dataavailable', (e) => {
    if (e.data && e.data.size > 0) state.mediaChunks.push(e.data);
  });
  recorder.addEventListener('stop', async () => {
    try {
      const type = recorder.mimeType || mimeType || 'audio/webm';
      const blob = new Blob(state.mediaChunks, { type });
      if (!blob.size) throw new Error('録音データが空でした。');
      let buffer = await blobToAudioBuffer(blob);
      buffer = toMonoBuffer(buffer);
      buffer = normalizeBufferSmart(buffer, recordTarget === 'disc' ? 0.82 : 0.88, recordTarget === 'disc' ? 3.0 : 4.0);

      if (recordTarget === 'disc') {
        state.discBuffer = buffer;
        state.discPausedOffset = 0;
        state.scratchPos = 0;
        state.visualRotation = 0;
        applyDiscRotation();
      } else if (recordTarget === 'piano') {
        state.pianoBuffer = buffer;
      }
    } catch (err) {
      console.error(err);
      showToast('録音データの変換に失敗しました');
    } finally {
      state.activeTarget = null;
      state.mediaRecorder = null;
      renderStatus();
    }
  }, { once: true });
  recorder.start();
  state.recordStopAt = performance.now() + maxMs;
  clearTimeout(state.recordTimer);
  state.recordTimer = setTimeout(() => stopRecording(false), maxMs + 20);
  renderStatus();
  const loop = () => {
    if (!state.activeTarget) return;
    updateRecButtons();
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}
function stopRecording(silent) {
  clearTimeout(state.recordTimer);
  state.recordTimer = null;
  const recorder = state.mediaRecorder;
  if (!recorder) return;
  if (recorder.state !== 'inactive') {
    try { recorder.stop(); } catch {}
  }
  if (silent) {
    state.mediaRecorder = null;
    state.activeTarget = null;
    renderStatus();
  }
}
function currentTime(){ return state.audioCtx ? state.audioCtx.currentTime : 0; }
function createDiscSource(offset=0){
  if (!state.discBuffer) return null;
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.discBuffer;
  src.loop = true;
  src.connect(state.discLoopGain);
  src.start(0, wrap(offset, state.discBuffer.duration));
  return src;
}
function currentDiscOffset(){
  if (!state.discBuffer) return 0;
  if (!state.discPlaying || !state.discLoopSource) return wrap(state.discPausedOffset, state.discBuffer.duration);
  return wrap(state.discPausedOffset + (currentTime() - state.discLoopStartTime), state.discBuffer.duration);
}
function startDiscPlayback(offset = null){
  if (!state.discBuffer) return;
  stopDiscPlayback(true);
  const startOffset = offset == null ? state.discPausedOffset : offset;
  state.discLoopSource = createDiscSource(startOffset);
  state.discPausedOffset = wrap(startOffset, state.discBuffer.duration);
  state.discLoopStartTime = currentTime();
  state.discPlaying = true;
  state.discLoopGain.gain.setTargetAtTime(1, currentTime(), 0.015);
  startSpin();
  renderStatus();
}
function stopDiscPlayback(silent=false){
  if (state.discLoopSource){
    state.discPausedOffset = currentDiscOffset();
    try { state.discLoopSource.stop(); } catch {}
    try { state.discLoopSource.disconnect(); } catch {}
    state.discLoopSource = null;
  }
  state.discPlaying = false;
  if (!silent) stopSpin();
  renderStatus();
}
function applyDiscRotation(){
  el.disc.style.transform = `rotate(${state.visualRotation}deg)`;
}
function startSpin(){
  cancelAnimationFrame(state.spinRaf);
  state.lastSpinTs = 0;
  const rpm = 33.3333;
  const degPerSec = rpm * 360 / 60;
  const loop = (ts) => {
    if (!state.discPlaying || state.scratching) {
      state.lastSpinTs = ts;
      state.spinRaf = requestAnimationFrame(loop);
      return;
    }
    if (!state.lastSpinTs) state.lastSpinTs = ts;
    const dt = (ts - state.lastSpinTs) / 1000;
    state.lastSpinTs = ts;
    state.visualRotation += degPerSec * dt;
    applyDiscRotation();
    state.spinRaf = requestAnimationFrame(loop);
  };
  state.spinRaf = requestAnimationFrame(loop);
}
function stopSpin(){
  cancelAnimationFrame(state.spinRaf);
  state.spinRaf = 0;
  state.lastSpinTs = 0;
}
function getAngleFromPointer(e){
  const rect = el.disc.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  return Math.atan2(e.clientY - cy, e.clientX - cx);
}
function playScratchAssist(offset, delta){
  if (!state.scratching || !state.discBuffer) return;
  const t = currentTime();
  if (t - state.scratchBurstAt < 0.009) return;
  state.scratchBurstAt = t;

  const src = state.audioCtx.createBufferSource();
  src.buffer = state.discBuffer;
  const gain = state.audioCtx.createGain();

  const motion = clamp(Math.abs(delta) / 0.14, 0, 1.2);
  const peakGain = 0.24 * motion;
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.linearRampToValueAtTime(Math.max(0.05, peakGain), t + 0.003);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);

  src.connect(gain).connect(state.discScratchGain);
  state.activeScratchSources.add(src);
  src.onended = () => state.activeScratchSources.delete(src);

  let start = wrap(offset, state.discBuffer.duration);
  let dur = Math.min(0.085, Math.max(0.03, state.discBuffer.duration - 0.001));
  if (start + dur >= state.discBuffer.duration) {
    start = Math.max(0, state.discBuffer.duration - dur - 0.001);
  }
  src.start(t, start, dur);
  src.stop(t + dur + 0.04);
}
function stopDiscScratchOnly(){
  state.scratching = false;
  state.scratchPointerId = null;
  cleanupScratchSources();
}
function onDiscPointerDown(e){
  if (!state.discBuffer) return;
  e.preventDefault();
  ensureAudio();
  el.disc.setPointerCapture(e.pointerId);
  state.scratching = true;
  state.scratchPointerId = e.pointerId;
  state.scratchPrevAngle = getAngleFromPointer(e);
  state.scratchPos = currentDiscOffset();
  cleanupScratchSources();
  if (state.discPlaying) {
    state.discLoopGain.gain.setTargetAtTime(0.62, currentTime(), 0.01);
  }
  renderStatus();
}
function onDiscPointerMove(e){
  if (!state.scratching || e.pointerId !== state.scratchPointerId || !state.discBuffer) return;
  e.preventDefault();
  const angle = getAngleFromPointer(e);
  let delta = normalizeAngleDelta(angle - state.scratchPrevAngle);
  state.scratchPrevAngle = angle;
  delta = clamp(delta, -0.7, 0.7);

  const dur = state.discBuffer.duration;
  const shift = (delta / (Math.PI * 2)) * dur;
  state.scratchPos = wrap(state.scratchPos + shift, dur);
  state.discPausedOffset = state.scratchPos;

  state.visualRotation += delta * 180 / Math.PI;
  applyDiscRotation();

  playScratchAssist(state.scratchPos, delta);
}
function onDiscPointerEnd(e){
  if (!state.scratching || e.pointerId !== state.scratchPointerId) return;
  e.preventDefault();
  cleanupScratchSources();
  stopDiscScratchOnly();
  if (state.discPlaying) {
    startDiscPlayback(state.scratchPos);
  } else {
    renderStatus();
  }
}
function semitoneRate(semi){ return Math.pow(2, semi / 12); }
function playPiano(semi){
  if (!state.pianoBuffer || !state.audioCtx) return;
  cleanupScratchSources();
  const t = currentTime();
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.pianoBuffer;
  src.playbackRate.value = semitoneRate(semi);

  const gain = state.audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.linearRampToValueAtTime(1.35, t + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + Math.min(2.4, Math.max(0.42, state.pianoBuffer.duration * 1.0)));

  src.connect(gain).connect(state.pianoBus);
  src.start(t, 0);
  src.stop(t + Math.min(2.6, Math.max(0.5, state.pianoBuffer.duration * 1.15)));
}
function buildKeys(){
  WHITE_NOTES.forEach((note)=>{
    const btn = document.createElement('button');
    btn.className = 'white-key';
    btn.addEventListener('pointerdown', async (e)=>{
      e.preventDefault();
      await ensureAudio();
      btn.classList.add('active');
      playPiano(note.semitone);
    });
    btn.addEventListener('pointerup', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointercancel', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointerleave', ()=>btn.classList.remove('active'));
    el.whiteKeys.appendChild(btn);
  });
}
function hook(){
  el.startBtn.addEventListener('click', async ()=>{
    try{
      await ensureAudio();
      await prepareMic();
      el.boot.style.display = 'none';
      showToast('マイク準備完了');
    }catch(err){
      console.error(err);
      showToast('マイク許可を確認してください');
    }
  });
  el.btnDiscRec.addEventListener('click', async ()=>{
    try{ await startRecording('disc'); }catch(err){ console.error(err); showToast('DISC録音を開始できませんでした'); }
  });
  el.btnPianoRec.addEventListener('click', async ()=>{
    try{ await startRecording('piano'); }catch(err){ console.error(err); showToast('PIANO録音を開始できませんでした'); }
  });
  el.btnDiscPlay.addEventListener('click', async ()=>{
    try{
      await ensureAudio();
      if (state.discBuffer) startDiscPlayback(currentDiscOffset());
    }catch(err){ console.error(err); }
  });
  el.btnDiscStop.addEventListener('click', ()=>{
    stopDiscPlayback();
    cleanupScratchSources();
  });
  el.discVol.addEventListener('input', ()=>{
    state.discVol = Number(el.discVol.value) / 100;
    el.discVolValue.textContent = `${el.discVol.value}%`;
    if (state.discBus) state.discBus.gain.setTargetAtTime(state.discVol, currentTime(), 0.01);
  });
  el.pianoVol.addEventListener('input', ()=>{
    state.pianoVol = Number(el.pianoVol.value) / 100;
    el.pianoVolValue.textContent = `${el.pianoVol.value}%`;
    if (state.pianoBus) state.pianoBus.gain.setTargetAtTime(state.pianoVol, currentTime(), 0.01);
  });

  el.disc.addEventListener('pointerdown', onDiscPointerDown);
  el.disc.addEventListener('pointermove', onDiscPointerMove);
  window.addEventListener('pointerup', onDiscPointerEnd);
  window.addEventListener('pointercancel', onDiscPointerEnd);

  window.addEventListener('blur', ()=>{
    if (state.activeTarget) stopRecording(false);
    cleanupScratchSources();
    stopDiscScratchOnly();
  });
  document.addEventListener('visibilitychange', ()=>{
    if (document.hidden && state.activeTarget) stopRecording(false);
  });
}
buildKeys();
hook();
renderStatus();
</script>
</body>
</html>
