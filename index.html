<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1014">
<title>QUICK DJ</title>
<style>
:root{
  --text:#f6f7f9;
  --muted:#98a1ad;
  --accent:#ef5757;
  --ok:#7de0a1;
  --line:rgba(255,255,255,.08);
  --shadow:0 14px 34px rgba(0,0,0,.36);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(circle at 30% 10%, #1c222b 0%, #11151a 48%, #090b0e 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body{touch-action:manipulation}
button,input{font:inherit}
#app{
  width:100vw;height:100vh;padding:
  max(8px, env(safe-area-inset-top))
  max(8px, env(safe-area-inset-right))
  max(8px, env(safe-area-inset-bottom))
  max(8px, env(safe-area-inset-left));
  display:flex;flex-direction:column;gap:10px;
}
.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
#top{
  flex:0 0 66%;
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(220px,.72fr) minmax(160px,.56fr);
  gap:10px;
}
#disc-area{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding-left:min(2.2vw, 16px);
  background:radial-gradient(circle at 45% 45%, #1d232c 0%, #14181e 58%, #0f1216 100%);
}
.disc-wrap{
  width:min(98%, calc(100vh * .56), calc(100vw * .58));
  aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
}
#disc{
  width:100%;height:100%;
  border-radius:50%;
  background-image:url("https://lh3.googleusercontent.com/d/11t6JbUXtU0C7Orlgx3Jbo_UYZq8JZW2u");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  box-shadow:0 16px 42px rgba(0,0,0,.40);
  touch-action:none; user-select:none;
  transform:rotate(0deg);
  will-change:transform;
}
#perform-area{
  padding:12px;
  display:grid;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
  align-content:stretch;
}
#perform-area .transport-btn{
  min-height:58px;
  width:100%;
}
.beat-btn,
.toggle-btn{
  border-radius:22px;
  letter-spacing:.08em;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 10px 22px rgba(0,0,0,.26);
  position:relative;
  overflow:hidden;
}
.beat-btn::after,
.toggle-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 24% 18%, rgba(255,255,255,.14), transparent 32%);
  pointer-events:none;
}
.beat-kick{
  background:linear-gradient(180deg, #59453f, #302622);
  border-color:rgba(255,176,115,.24);
}
.beat-kick.active-flash{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 0 0 1px rgba(255,176,115,.20), 0 0 24px rgba(255,160,90,.22);
}
.beat-clap{
  background:linear-gradient(180deg, #40506a, #243247);
  border-color:rgba(144,200,255,.24);
}
.beat-clap.active-flash{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 0 0 1px rgba(144,200,255,.20), 0 0 24px rgba(110,170,255,.22);
}
.toggle-btn{
  background:linear-gradient(180deg, #3a4450, #20262e);
}
.toggle-btn.playing{
  background:linear-gradient(180deg, #486a52, #23352a);
  border-color:rgba(125,224,161,.28);
}
.toggle-btn::before{
  content:'';
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#cfd7e2;
  margin-right:10px;
  vertical-align:middle;
  box-shadow:0 0 0 0 rgba(255,255,255,.0);
  position:relative;
  z-index:1;
}
.toggle-btn.playing::before{
  background:#7de0a1;
  box-shadow:0 0 10px rgba(125,224,161,.55);
}
.pill{
  position:absolute;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  font-size:clamp(11px, 1.6vh, 15px);
  letter-spacing:.08em;
  white-space:nowrap;
}
#disc-status{left:12px;bottom:12px}
#disc-play-state{right:12px;bottom:12px}
#piano-status{
  justify-self:start;
  margin-bottom:2px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  font-size:clamp(11px, 1.6vh, 15px);
  letter-spacing:.08em;
  white-space:nowrap;
  min-width:140px;
}
#disc-status{
  min-width:140px;
}
#beat-flash{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .08s ease-out;
  z-index:5;
}
#beat-flash.kick{
  background:radial-gradient(circle at 50% 50%, rgba(255,170,90,.12), rgba(255,120,70,.06), transparent 70%);
  opacity:1;
}
#beat-flash.clap{
  background:radial-gradient(circle at 50% 50%, rgba(130,210,255,.12), rgba(110,150,255,.06), transparent 70%);
  opacity:1;
}
#control-area{
  padding:10px;
  display:grid;
  grid-template-rows:auto auto auto auto auto;
  gap:8px;
  align-content:center;
  justify-content:stretch;
}
#perform-area{
  padding:12px;
  display:grid;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
  align-content:center;
}
.title{
  font-size:clamp(13px, 1.8vh, 18px);
  color:#d6dbe2;
  letter-spacing:.12em;
}
button.ctrl{
  min-height:50px;
  border:none;
  border-radius:16px;
  color:var(--text);
  background:linear-gradient(180deg, #2b313a, #1a1f26);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 8px 18px rgba(0,0,0,.22);
}
button.ctrl:active{transform:translateY(1px)}
button.ctrl[disabled]{opacity:.45}
button.ctrl.waiting{
  background:linear-gradient(180deg, #36404c, #232932);
  border-color:rgba(255,255,255,.16);
}
button.ctrl.processing{
  background:linear-gradient(180deg, #2f3944, #21262e);
  border-color:rgba(140,180,255,.24);
  color:#eef4ff;
}
button.ctrl.processing::after,
button.ctrl.waiting::after{
  content:'';
  display:inline-block;
  width:8px;height:8px;border-radius:50%;
  margin-left:10px;
  background:currentColor;
  opacity:.8;
  animation:pulseDot .9s ease-in-out infinite;
  vertical-align:middle;
}
@keyframes pulseDot{
  0%,100%{transform:scale(.7); opacity:.35}
  50%{transform:scale(1); opacity:1}
}
#busy-overlay{
  position:fixed; inset:0; z-index:25;
  display:none; align-items:center; justify-content:center;
  background:rgba(8,10,13,.18);
  pointer-events:none;
}
#busy-overlay.show{ display:flex; }
.busy-card{
  padding:12px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(12,16,22,.72);
  backdrop-filter:blur(12px);
  display:flex; align-items:center; gap:12px;
  box-shadow:0 16px 34px rgba(0,0,0,.28);
}
.busy-spinner{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,.18);
  border-top-color:#fff;
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
button.rec.active{
  background:linear-gradient(180deg, #863737, #561f1f);
  border-color:rgba(255,120,120,.28);
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slider-wrap{
  padding:7px 9px 8px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border-radius:15px;
}
.slider-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:clamp(10px, 1.35vh, 13px);
  color:#d6dbe2;
  margin-bottom:4px;
  letter-spacing:.08em;
}
input[type="range"]{
  appearance:none;-webkit-appearance:none;
  width:100%;height:24px;background:transparent;margin:0;
}
input[type="range"]::-webkit-slider-runnable-track{
  height:6px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-moz-range-track{
  height:6px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  margin-top:-7px;background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
input[type="range"]::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;
  background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.small{
  font-size:clamp(11px, 1.45vh, 13px);
  color:var(--muted);
  line-height:1.45;
}
#piano-area{
  flex:1;
  min-height:0;
  position:relative;
  display:grid;
  grid-template-rows:auto 1fr;
  padding:6px 8px 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
    radial-gradient(circle at 50% 0%, #1c232d 0%, #14191f 60%, #0f1217 100%);
}
#keys{
  position:relative;
  width:100%;
  height:100%;
  min-height:0;
}
#white-keys{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
}
.white-key{
  border:none;
  border-radius:0 0 10px 10px;
  background:linear-gradient(180deg,#ffffff 0%,#f2f4f6 62%,#dce2e8 100%);
  box-shadow:inset 0 -10px 14px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.7);
  min-width:0;
}
.white-key:active,.white-key.active{
  background:linear-gradient(180deg,#eceff3 0%,#d4dbe3 100%);
}
.dot{
  display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--muted);margin-right:8px;
}
.dot.ok{background:var(--ok)}
.dot.rec{background:var(--accent); box-shadow:0 0 12px rgba(239,87,87,.58)}
#boot{
  position:fixed;inset:0;z-index:30;
  background:linear-gradient(180deg, rgba(8,10,13,.94), rgba(8,10,13,.97));
  display:flex;align-items:center;justify-content:center;
  padding:18px;
}
.boot-card{
  width:min(560px, 100%);
  border-radius:24px;
  padding:20px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  box-shadow:0 20px 46px rgba(0,0,0,.36);
}
.boot-title{font-size:clamp(26px, 4vw, 36px);letter-spacing:.1em;margin-bottom:10px}
.boot-copy{font-size:clamp(14px, 2vw, 18px);line-height:1.6;color:#e3e7ec}
.boot-copy p{margin:.2em 0}
#start-btn{
  width:100%;margin-top:16px;min-height:58px;border:none;border-radius:18px;
  font-size:18px;font-weight:700;letter-spacing:.08em;color:#fff;
  background:linear-gradient(180deg,#3b82f6,#2559b7);
  box-shadow:0 12px 28px rgba(37,89,183,.35);
}
#start-btn.readying{
  background:linear-gradient(180deg,#4b8cff,#2f66cf);
  box-shadow:0 0 0 0 rgba(80,140,255,.45), 0 12px 28px rgba(37,89,183,.35);
  animation:startPulse 1s ease-in-out infinite;
}
#start-btn.started{
  transform:scale(.985);
}
@keyframes startPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(80,140,255,.20), 0 12px 28px rgba(37,89,183,.35)}
  50%{box-shadow:0 0 0 10px rgba(80,140,255,.08), 0 12px 28px rgba(37,89,183,.35)}
}
.boot-card.flash{
  animation:bootFlash .28s ease-out;
}
@keyframes bootFlash{
  0%{transform:scale(1); box-shadow:0 20px 46px rgba(0,0,0,.36)}
  35%{transform:scale(1.015); box-shadow:0 24px 54px rgba(40,110,255,.24)}
  100%{transform:scale(1); box-shadow:0 20px 46px rgba(0,0,0,.36)}
}
#toast{
  position:fixed;left:50%;top:14px;transform:translateX(-50%);
  z-index:40;padding:10px 14px;border-radius:999px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);
  font-size:14px;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .18s;
}
#toast.show{opacity:1}
@media (max-width: 900px){
  #top{grid-template-columns:minmax(0,1.2fr) minmax(180px,.62fr) minmax(136px,.42fr)}
  #control-area{padding:8px; gap:6px}
  #perform-area{padding:8px; gap:8px}
  button.ctrl{min-height:42px; border-radius:14px}
  .slider-wrap{padding:5px 7px 6px; border-radius:13px}
  .slider-head{margin-bottom:3px; font-size:clamp(9px, 1.2vh, 12px)}
  input[type="range"]{height:20px}
  input[type="range"]::-webkit-slider-runnable-track{height:5px}
  input[type="range"]::-moz-range-track{height:5px}
  input[type="range"]::-webkit-slider-thumb{width:18px;height:18px;margin-top:-6.5px}
  input[type="range"]::-moz-range-thumb{width:18px;height:18px}
  #disc-area{padding-left:10px}
  .disc-wrap{width:min(99%, calc(100vh * .47), calc(100vw * .50))}
  #perform-area .transport-btn{min-height:40px; font-size:clamp(10px, 1.5vh, 13px)}
  .title{font-size:clamp(11px, 1.45vh, 14px)}
  #piano-status,#disc-status{min-width:132px; padding:7px 11px; font-size:clamp(10px,1.4vh,14px)}
}
@media (max-height: 520px){
  #app{gap:8px}
  #top{flex-basis:64%}
  button.ctrl{min-height:38px}
  #control-area{padding:7px; gap:5px}
  #perform-area{padding:7px; gap:6px}
  .slider-wrap{padding:4px 6px 5px}
  .slider-head{margin-bottom:2px; font-size:11px}
  input[type="range"]{height:18px}
  input[type="range"]::-webkit-slider-runnable-track{height:4px}
  input[type="range"]::-moz-range-track{height:4px}
  input[type="range"]::-webkit-slider-thumb{width:16px;height:16px;margin-top:-6px}
  input[type="range"]::-moz-range-thumb{width:16px;height:16px}
  #perform-area .transport-btn{min-height:38px; font-size:12px}
  #piano-status,#disc-status{padding:7px 11px}
}
</style>
</head>
<body>
<div id="app">
  <section id="top">
    <div id="disc-area" class="panel">
      <div class="disc-wrap">
        <div id="disc" aria-label="record"></div>
      </div>
      <div id="disc-status" class="pill"><span class="dot"></span>DISC EMPTY</div>
    </div>
    <aside id="control-area" class="panel">
      <div class="title">QUICK DJ</div>
      <button id="btn-disc-rec" class="ctrl rec">DISC REC</button>
      <div class="slider-wrap">
        <div class="slider-head"><span>DISC VOL</span><span id="disc-vol-value">50%</span></div>
        <input id="disc-vol" type="range" min="0" max="100" value="50">
      </div>
      <button id="btn-piano-rec" class="ctrl rec">PIANO REC</button>
      <div class="slider-wrap">
        <div class="slider-head"><span>PIANO VOL</span><span id="piano-vol-value">50%</span></div>
        <input id="piano-vol" type="range" min="0" max="100" value="50">
      </div>
    </aside>
    <aside id="perform-area" class="panel">
      <button id="btn-beat-kick" class="ctrl transport-btn beat-btn beat-kick">KICK</button>
      <button id="btn-beat-clap" class="ctrl transport-btn beat-btn beat-clap">CLAP</button>
      <button id="btn-disc-toggle" class="ctrl transport-btn toggle-btn">DISC PLAY</button>
    </aside>
  </section>

  <section id="piano-area" class="panel">
    <div id="piano-status">PIANO EMPTY</div>
    <div id="keys">
      <div id="white-keys"></div>
    </div>
  </section>
  <div id="busy-overlay" aria-hidden="true">
    <div class="busy-card">
      <div class="busy-spinner"></div>
      <div id="busy-text">PROCESSING...</div>
    </div>
  </div>
  <div id="beat-flash"></div>
</div>

<div id="boot">
  <div id="boot-card" class="boot-card">
    <div class="boot-title">QUICK DJ</div>
    <div class="boot-copy">
      <p>ディスクとピアノをそれぞれ録音して、誰でも簡単DJ体験！</p>
    </div>
    <button id="start-btn">START</button>
  </div>
</div>

<div id="toast"></div>


<script>
const DISC_MAX_MS = 10000;
const PIANO_MAX_MS = 3000;
const WHITE_NOTES = [
  {name:"C", semitone:0},
  {name:"D", semitone:2},
  {name:"E", semitone:4},
  {name:"F", semitone:5},
  {name:"G", semitone:7},
  {name:"A", semitone:9},
  {name:"B", semitone:11},
  {name:"C5", semitone:12},
];
const SCRATCH_SEGMENT_SEC = 0.075;
const SCRATCH_MIN_DELTA = 0.008;
const SCRATCH_EMIT_MS = 6;
const PIANO_TRIM_THRESHOLD = 0.018;
const PIANO_TRIM_MAX_MS = 140;
const ZERO_CROSS_SEARCH_MS = 18;
const RMS_WINDOW_MS = 8;
const REC_START_TIMEOUT_MS = 1800;
const REC_STOP_GRACE_MS = 400;
const UI_STATE = {
  IDLE: 'idle',
  WAITING: 'waiting',
  RECORDING: 'recording',
  PROCESSING: 'processing',
  READY: 'ready',
  ERROR: 'error'
};

const state = {
  audioCtx: null,
  micStream: null,
  activeTarget: null,
  recordStopAt: 0,

  discBuffer: null,
  discReverseBuffer: null,
  pianoBuffer: null,
  pianoStartOffset: 0,

  discBus: null,
  pianoBus: null,
  discVol: 0.50,
  pianoVol: 0.50,

  discPlaying: false,
  discLoopSource: null,
  discLoopStartTime: 0,
  discPausedOffset: 0,

  scratching: false,
  wasPlayingBeforeScratch: false,
  scratchPointerId: null,
  scratchPrevAngle: 0,
  scratchPos: 0,
  lastScratchEmitAt: 0,

  visualRotation: 0,
  spinRaf: 0,
  lastSpinTs: 0,

  discUiState: UI_STATE.IDLE,
  pianoUiState: UI_STATE.IDLE,
  discRemainingSec: 0,
  pianoRemainingSec: 0,
  activeRecorder: null,
  activeRecordStopTimer: null,
  activeRecordTickRaf: 0
};

const el = {
  disc: document.getElementById('disc'),
  discStatus: document.getElementById('disc-status'),
  pianoStatus: document.getElementById('piano-status'),
  btnDiscRec: document.getElementById('btn-disc-rec'),
  btnBeatKick: document.getElementById('btn-beat-kick'),
  btnBeatClap: document.getElementById('btn-beat-clap'),
  btnDiscToggle: document.getElementById('btn-disc-toggle'),
  btnPianoRec: document.getElementById('btn-piano-rec'),
  discVol: document.getElementById('disc-vol'),
  discVolValue: document.getElementById('disc-vol-value'),
  pianoVol: document.getElementById('piano-vol'),
  pianoVolValue: document.getElementById('piano-vol-value'),
  whiteKeys: document.getElementById('white-keys'),
  boot: document.getElementById('boot'),
  startBtn: document.getElementById('start-btn'),
  bootCard: document.getElementById('boot-card'),
  toast: document.getElementById('toast'),
  busyOverlay: document.getElementById('busy-overlay'),
  busyText: document.getElementById('busy-text'),
  beatFlash: document.getElementById('beat-flash')
};

function showToast(msg){
  el.toast.textContent = msg;
  el.toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>el.toast.classList.remove('show'), 1800);
}
function wrap(v, max){
  if (!max || max <= 0) return 0;
  return ((v % max) + max) % max;
}
function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
function normalizeAngleDelta(d){
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}
function formatRecButton(target, remainSec){
  const n = Math.max(0, remainSec).toFixed(1);
  return target === 'disc' ? `DISC STOP ${n}` : `PIANO STOP ${n}`;
}
function pickMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/mp4',
    'audio/webm',
    'audio/ogg;codecs=opus'
  ];
  for (const type of candidates) {
    try {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) return type;
    } catch {}
  }
  return '';
}
async function ensureAudio(){
  if (!state.audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new Ctx({ latencyHint: 'interactive' });
    state.discBus = state.audioCtx.createGain();
    state.pianoBus = state.audioCtx.createGain();
    state.discBus.gain.value = state.discVol;

      setButtonPressedVisual(el.startBtn);
      el.startBtn.classList.add('readying');
      el.bootCard.classList.add('flash');
      el.startBtn.textContent = 'STARTING...';
      await ensureAudio();
      playStartChime();
      await prepareMic();
      el.startBtn.classList.remove('readying');
      el.startBtn.classList.add('started');
      el.startBtn.textContent = 'READY';
      showToast('マイク準備完了');
      setTimeout(() => {
        el.boot.style.display = 'none';
      }, 180);
    }catch(err){
      console.error(err);
      el.startBtn.classList.remove('readying');
      el.startBtn.textContent = 'START';
      if (err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')) {
        showToast('マイク許可を確認してください');
      } else {
        showToast('起動処理でエラーが発生しました');
      }
    }finally{
      setTimeout(() => {
        el.bootCard.classList.remove('flash');
        el.startBtn.classList.remove('started');
      }, 220);
    }
  });
  el.btnDiscRec.addEventListener('click', async ()=>{
    try { await onRecordButtonPress('disc', el.btnDiscRec); }
    catch(err){ console.error(err); showToast('DISC録音を開始できませんでした'); }
  });
  el.btnPianoRec.addEventListener('click', async ()=>{
    try { await onRecordButtonPress('piano', el.btnPianoRec); }
    catch(err){ console.error(err); showToast('PIANO録音を開始できませんでした'); }
  });
  el.btnBeatKick.addEventListener('click', async ()=>{
    try{
      setButtonPressedVisual(el.btnBeatKick);
      await ensureAudio();
      playKick();
    }catch(err){ console.error(err); }
  });
  el.btnBeatClap.addEventListener('click', async ()=>{
    try{
      setButtonPressedVisual(el.btnBeatClap);
      await ensureAudio();
      playClap();
    }catch(err){ console.error(err); }
  });
  el.btnDiscToggle.addEventListener('click', async ()=>{
    try{
      setButtonPressedVisual(el.btnDiscToggle);
      await ensureAudio();
      if (!state.discBuffer) return;
      if (state.discPlaying) stopDiscPlayback();
      else startDiscPlayback(currentDiscOffset());
      renderStatus();
    }catch(err){ console.error(err); }
  });

  el.discVol.addEventListener('input', ()=>{
    state.discVol = Number(el.discVol.value) / 100;
    el.discVolValue.textContent = `${el.discVol.value}%`;
    if (state.discBus) state.discBus.gain.setTargetAtTime(state.discVol, currentTime(), 0.01);
  });
  el.pianoVol.addEventListener('input', ()=>{
    state.pianoVol = Number(el.pianoVol.value) / 100;
    el.pianoVolValue.textContent = `${el.pianoVol.value}%`;
    if (state.pianoBus) state.pianoBus.gain.setTargetAtTime(state.pianoVol, currentTime(), 0.01);
  });

  el.disc.addEventListener('pointerdown', onDiscPointerDown);
  el.disc.addEventListener('pointermove', onDiscPointerMove);
  window.addEventListener('pointerup', onDiscPointerEnd);
  window.addEventListener('pointercancel', onDiscPointerEnd);

  window.addEventListener('blur', ()=>{ stopDiscScratchOnly(); });
}
buildKeys();
renderRecordButtons();
renderStatus();
hook();
</script>
</body>
</html>
