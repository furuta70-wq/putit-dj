<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1014">
<title>QUICK DJ</title>
<style>
:root{
  --bg0:#090b0e;
  --bg1:#12151a;
  --panel:#161a20;
  --panel2:#1b2027;
  --line:rgba(255,255,255,.08);
  --line2:rgba(255,255,255,.14);
  --text:#f6f7f9;
  --muted:#98a1ad;
  --accent:#ef5757;
  --ok:#7de0a1;
  --soft:#7aa7ff;
  --shadow:0 14px 34px rgba(0,0,0,.36);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(circle at 30% 10%, #1c222b 0%, #11151a 48%, #090b0e 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body{touch-action:manipulation}
button,input{font:inherit}
#app{
  width:100vw;height:100vh;padding:
  max(8px, env(safe-area-inset-top))
  max(8px, env(safe-area-inset-right))
  max(8px, env(safe-area-inset-bottom))
  max(8px, env(safe-area-inset-left));
  display:flex;flex-direction:column;gap:10px;
}
.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
#top{
  flex:0 0 68%;
  min-height:0;
  display:grid;
  grid-template-columns:64fr 36fr;
  gap:10px;
}
#disc-area{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding-left:min(3vw, 22px);
  background:
    radial-gradient(circle at 45% 45%, #1d232c 0%, #14181e 58%, #0f1216 100%);
}
.disc-wrap{
  width:min(96%, calc(100vh * .58), calc(100vw * .56));
  aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
}
#disc{
  width:100%;height:100%;
  border-radius:50%;
  background-image:url("https://lh3.googleusercontent.com/d/11t6JbUXtU0C7Orlgx3Jbo_UYZq8JZW2u");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  box-shadow:0 16px 42px rgba(0,0,0,.40);
  touch-action:none; user-select:none;
  transform:rotate(0deg);
  will-change:transform;
}
.pill{
  position:absolute;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  font-size:clamp(11px, 1.6vh, 15px);
  letter-spacing:.08em;
  white-space:nowrap;
}
#disc-status{left:12px;bottom:12px}
#disc-play-state{right:12px;bottom:12px}
#control-area{
  padding:12px;
  display:grid;
  grid-template-rows:auto auto auto auto auto 1fr;
  gap:10px;
  align-content:start;
}
.title{
  font-size:clamp(13px, 1.8vh, 18px);
  color:#d6dbe2;
  letter-spacing:.12em;
}
button.ctrl{
  min-height:54px;
  border:none;
  border-radius:18px;
  color:var(--text);
  background:linear-gradient(180deg, #2b313a, #1a1f26);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 8px 18px rgba(0,0,0,.22);
}
button.ctrl:active{transform:translateY(1px)}
button.ctrl[disabled]{opacity:.45}
button.rec.active{
  background:linear-gradient(180deg, #863737, #561f1f);
  border-color:rgba(255,120,120,.28);
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slider-wrap{
  padding:10px 12px 12px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border-radius:18px;
}
.slider-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:clamp(11px, 1.5vh, 14px);
  color:#d6dbe2;
  margin-bottom:8px;
  letter-spacing:.08em;
}
input[type="range"]{
  appearance:none;-webkit-appearance:none;
  width:100%;height:34px;background:transparent;margin:0;
}
input[type="range"]::-webkit-slider-runnable-track{
  height:8px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-moz-range-track{
  height:8px;border-radius:999px;background:linear-gradient(90deg,#38414d,#586273);
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:24px;height:24px;border-radius:50%;
  margin-top:-8px;background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
input[type="range"]::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;
  background:#f6f7f9;border:2px solid #a3b2c8;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.small{
  font-size:clamp(11px, 1.45vh, 13px);
  color:var(--muted);
  line-height:1.45;
}
#piano-area{
  flex:1;
  min-height:0;
  position:relative;
  display:grid;
  grid-template-rows:auto 1fr;
  padding:8px 8px 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
    radial-gradient(circle at 50% 0%, #1c232d 0%, #14191f 60%, #0f1217 100%);
}
#piano-status{
  justify-self:start;
  margin-bottom:4px;
  padding:4px 8px;
  font-size:clamp(10px,1.3vh,13px);
  color:#d7dde5;
  letter-spacing:.08em;
}
#keys{
  position:relative;
  width:100%;
  height:100%;
  min-height:0;
}
#white-keys{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
}
.white-key{
  border:none;
  border-radius:0 0 10px 10px;
  background:linear-gradient(180deg,#ffffff 0%,#f2f4f6 65%,#dfe4ea 100%);
  box-shadow:inset 0 -10px 14px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.7);
  min-width:0;
}
.white-key:active,.white-key.active{
  background:linear-gradient(180deg,#eceff3 0%,#dce2e8 100%);
}
#black-layer{
  position:absolute;
  left:0;right:0;top:0;
  height:64%;
  pointer-events:none;
}
.black-key{
  position:absolute;
  top:0;
  width:9.4%;
  height:100%;
  border:none;
  border-radius:0 0 8px 8px;
  background:linear-gradient(180deg,#3a414b 0%,#1b1f26 70%,#0c0e12 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 4px 10px rgba(0,0,0,.3);
  pointer-events:auto;
}
.black-key:active,.black-key.active{
  background:linear-gradient(180deg,#222830 0%,#0e1115 100%);
}
.key-label{display:none}
.dot{
  display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--muted);margin-right:8px;
}
.dot.ok{background:var(--ok)}
.dot.rec{background:var(--accent); box-shadow:0 0 12px rgba(239,87,87,.58)}
#boot{
  position:fixed;inset:0;z-index:30;
  background:linear-gradient(180deg, rgba(8,10,13,.94), rgba(8,10,13,.97));
  display:flex;align-items:center;justify-content:center;
  padding:18px;
}
.boot-card{
  width:min(560px, 100%);
  border-radius:24px;
  padding:20px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  box-shadow:0 20px 46px rgba(0,0,0,.36);
}
.boot-title{font-size:clamp(26px, 4vw, 36px);letter-spacing:.1em;margin-bottom:10px}
.boot-copy{font-size:clamp(14px, 2vw, 18px);line-height:1.6;color:#e3e7ec}
.boot-copy p{margin:.2em 0}
#start-btn{
  width:100%;margin-top:16px;min-height:58px;border:none;border-radius:18px;
  font-size:18px;font-weight:700;letter-spacing:.08em;color:#fff;
  background:linear-gradient(180deg,#3b82f6,#2559b7);
  box-shadow:0 12px 28px rgba(37,89,183,.35);
}
#toast{
  position:fixed;left:50%;top:14px;transform:translateX(-50%);
  z-index:40;padding:10px 14px;border-radius:999px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);
  font-size:14px;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .18s;
}
#toast.show{opacity:1}
@media (max-width: 900px){
  #top{grid-template-columns:61fr 39fr}
  #control-area{padding:10px}
  button.ctrl{min-height:50px}
  .slider-wrap{padding:8px 10px 10px}
  #disc-area{padding-left:10px}
  .disc-wrap{width:min(98%, calc(100vh * .56), calc(100vw * .58))}
}
@media (max-height: 520px){
  #app{gap:8px}
  #top{flex-basis:66%}
  button.ctrl{min-height:46px}
  #piano-area{padding-top:6px}
  #black-layer{height:66%}
}
</style>
</head>
<body>
<div id="app">
  <section id="top">
    <div id="disc-area" class="panel">
      <div class="disc-wrap">
        <div id="disc" aria-label="record"></div>
      </div>
      <div id="disc-status" class="pill"><span class="dot"></span>DISC EMPTY</div>
      <div id="disc-play-state" class="pill">STOPPED</div>
    </div>
    <aside id="control-area" class="panel">
      <div class="title">QUICK DJ</div>
      <button id="btn-disc-rec" class="ctrl rec">DISC REC</button>
      <div class="row">
        <button id="btn-disc-play" class="ctrl">DISC PLAY</button>
        <button id="btn-disc-stop" class="ctrl">DISC STOP</button>
      </div>
      <div class="slider-wrap">
        <div class="slider-head"><span>DISC VOL</span><span id="disc-vol-value">85%</span></div>
        <input id="disc-vol" type="range" min="0" max="100" value="85">
      </div>
      <button id="btn-piano-rec" class="ctrl rec">PIANO REC</button>
      <div class="slider-wrap">
        <div class="slider-head"><span>PIANO VOL</span><span id="piano-vol-value">90%</span></div>
        <input id="piano-vol" type="range" min="0" max="100" value="90">
      </div>
      <div class="small">DISC は最大10秒、PIANO は最大3秒まで録音できます。</div>
    </aside>
  </section>

  <section id="piano-area" class="panel">
    <div id="piano-status">PIANO EMPTY</div>
    <div id="keys">
      <div id="white-keys"></div>
      <div id="black-layer"></div>
    </div>
  </section>
</div>

<div id="boot">
  <div class="boot-card">
    <div class="boot-title">QUICK DJ</div>
    <div class="boot-copy">
      <p>ディスクとピアノをそれぞれ録音して、誰でも簡単DJ体験！</p>
      <p>録音がうまくいかない場合は、ブラウザの設定を見直してください。</p>
    </div>
    <button id="start-btn">START</button>
  </div>
</div>

<div id="toast"></div>

<script>
const DISC_MAX_MS = 10000;
const PIANO_MAX_MS = 3000;
const DISC_IMG_URL = "https://lh3.googleusercontent.com/d/11t6JbUXtU0C7Orlgx3Jbo_UYZq8JZW2u";
const WHITE_NOTES = [
  {name:"C", semitone:0},
  {name:"D", semitone:2},
  {name:"E", semitone:4},
  {name:"F", semitone:5},
  {name:"G", semitone:7},
  {name:"A", semitone:9},
  {name:"B", semitone:11},
  {name:"C5", semitone:12},
];
const BLACK_NOTES = [
  {name:"C#", semitone:1, left:7.6},
  {name:"D#", semitone:3, left:20.2},
  {name:"F#", semitone:6, left:45.2},
  {name:"G#", semitone:8, left:57.8},
  {name:"A#", semitone:10, left:70.4},
];

const state = {
  audioCtx: null,
  compressor: null,
  micStream: null,
  mediaRecorder: null,
  mediaChunks: [],
  mediaMimeType: "",
  activeRecordTarget: null,
  recordEndAt: 0,
  recordTicker: null,

  discBuffer: null,
  pianoBuffer: null,

  discPlaying: false,
  discLoopSource: null,
  discLoopStartTime: 0,
  discPausedOffset: 0,

  discBus: null,
  discLoopGain: null,
  discScratchGain: null,
  pianoBus: null,

  visualRotation: 0,
  spinRaf: 0,
  lastSpinTs: 0,

  scratching: false,
  scratchPointerId: null,
  scratchPrevAngle: 0,
  scratchPos: 0,
  scratchBurstAt: 0,

  discVol: 0.85,
  pianoVol: 0.90
};

const els = {
  disc: document.getElementById('disc'),
  discStatus: document.getElementById('disc-status'),
  discPlayState: document.getElementById('disc-play-state'),
  pianoStatus: document.getElementById('piano-status'),
  btnDiscRec: document.getElementById('btn-disc-rec'),
  btnDiscPlay: document.getElementById('btn-disc-play'),
  btnDiscStop: document.getElementById('btn-disc-stop'),
  btnPianoRec: document.getElementById('btn-piano-rec'),
  discVol: document.getElementById('disc-vol'),
  discVolValue: document.getElementById('disc-vol-value'),
  pianoVol: document.getElementById('piano-vol'),
  pianoVolValue: document.getElementById('piano-vol-value'),
  whiteKeys: document.getElementById('white-keys'),
  blackLayer: document.getElementById('black-layer'),
  boot: document.getElementById('boot'),
  startBtn: document.getElementById('start-btn'),
  toast: document.getElementById('toast'),
};

function toast(msg){
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>els.toast.classList.remove('show'), 1800);
}

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function wrap(v, max){
  if (!max || max <= 0) return 0;
  return ((v % max) + max) % max;
}
function now(){
  return state.audioCtx ? state.audioCtx.currentTime : 0;
}
function normalizeAngleDelta(d){
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}
function formatRecButton(target, remainSec){
  const n = Math.max(0, remainSec).toFixed(1);
  return target === 'disc' ? `DISC REC ${n}` : `PIANO REC ${n}`;
}

function chooseMimeType(){
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/mp4',
    'audio/webm',
    'audio/ogg;codecs=opus'
  ];
  for (const t of candidates){
    try {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return t;
    } catch(e){}
  }
  return '';
}

async function initAudioIfNeeded(){
  if (!state.audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new Ctx({ latencyHint: 'interactive' });

    state.discBus = state.audioCtx.createGain();
    state.discLoopGain = state.audioCtx.createGain();
    state.discScratchGain = state.audioCtx.createGain();
    state.pianoBus = state.audioCtx.createGain();
    state.compressor = state.audioCtx.createDynamicsCompressor();

    state.compressor.threshold.value = -18;
    state.compressor.knee.value = 18;
    state.compressor.ratio.value = 3;
    state.compressor.attack.value = 0.003;
    state.compressor.release.value = 0.15;

    state.discBus.gain.value = state.discVol;
    state.discLoopGain.gain.value = 1;
    state.discScratchGain.gain.value = 1;
    state.pianoBus.gain.value = state.pianoVol;

    state.discLoopGain.connect(state.discBus);
    state.discScratchGain.connect(state.discBus);
    state.discBus.connect(state.compressor);
    state.pianoBus.connect(state.compressor);
    state.compressor.connect(state.audioCtx.destination);
  }
  if (state.audioCtx.state !== 'running') {
    await state.audioCtx.resume();
  }
}

async function prepareMic(){
  if (state.micStream) return state.micStream;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error('このブラウザではマイク録音に対応していません');
  }
  state.micStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    }
  });
  return state.micStream;
}

function stopMediaRecorderIfNeeded(){
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive'){
    try{ state.mediaRecorder.stop(); }catch(e){}
  }
}

async function blobToAudioBuffer(blob){
  const ab = await blob.arrayBuffer();
  return await state.audioCtx.decodeAudioData(ab);
}

function renderStatuses(){
  let discText = 'DISC EMPTY';
  let discDot = '';
  if (state.activeRecordTarget === 'disc'){
    discText = 'DISC RECORDING';
    discDot = 'rec';
  } else if (state.discBuffer){
    discText = 'DISC READY';
    discDot = 'ok';
  }
  els.discStatus.innerHTML = `<span class="dot ${discDot}"></span>${discText}`;

  if (state.activeRecordTarget === 'piano'){
    els.pianoStatus.innerHTML = `<span class="dot rec"></span>PIANO RECORDING`;
  } else if (state.pianoBuffer){
    els.pianoStatus.innerHTML = `<span class="dot ok"></span>PIANO READY`;
  } else {
    els.pianoStatus.textContent = 'PIANO EMPTY';
  }

  els.btnDiscPlay.disabled = !state.discBuffer || state.activeRecordTarget !== null;
  els.btnDiscStop.disabled = !state.discBuffer || state.activeRecordTarget !== null;
  els.btnDiscRec.disabled = state.activeRecordTarget === 'piano';
  els.btnPianoRec.disabled = state.activeRecordTarget === 'disc';
  els.discPlayState.textContent = state.discPlaying ? 'PLAYING' : 'STOPPED';
}

function startRecordTicker(target, maxMs){
  clearInterval(state.recordTicker);
  state.recordEndAt = performance.now() + maxMs;
  const tick = ()=>{
    const remain = Math.max(0, state.recordEndAt - performance.now());
    const sec = remain / 1000;
    if (target === 'disc'){
      els.btnDiscRec.textContent = formatRecButton('disc', sec);
      els.btnDiscRec.classList.add('active');
    } else {
      els.btnPianoRec.textContent = formatRecButton('piano', sec);
      els.btnPianoRec.classList.add('active');
    }
    if (remain <= 0){
      stopRecording();
    }
  };
  tick();
  state.recordTicker = setInterval(tick, 50);
}

function resetRecordButtons(){
  clearInterval(state.recordTicker);
  state.recordTicker = null;
  els.btnDiscRec.textContent = 'DISC REC';
  els.btnPianoRec.textContent = 'PIANO REC';
  els.btnDiscRec.classList.remove('active');
  els.btnPianoRec.classList.remove('active');
}

async function startRecording(target){
  await initAudioIfNeeded();
  await prepareMic();

  if (state.activeRecordTarget) await stopRecording();
  stopDiscScratchOnly();
  if (target === 'disc') stopDiscPlayback();

  state.mediaChunks = [];
  state.activeRecordTarget = target;
  const mimeType = state.mediaMimeType || chooseMimeType();
  state.mediaMimeType = mimeType;
  const options = mimeType ? { mimeType } : undefined;
  state.mediaRecorder = new MediaRecorder(state.micStream, options);

  state.mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) state.mediaChunks.push(e.data);
  };
  state.mediaRecorder.onstop = async () => {
    const targetLocal = state.activeRecordTarget;
    const chunks = state.mediaChunks.slice();
    state.activeRecordTarget = null;
    resetRecordButtons();
    renderStatuses();

    if (!chunks.length) return;

    try{
      const blob = new Blob(chunks, { type: state.mediaMimeType || 'audio/webm' });
      const buf = await blobToAudioBuffer(blob);
      if (targetLocal === 'disc'){
        state.discBuffer = buf;
        state.discPausedOffset = 0;
        state.scratchPos = 0;
        state.visualRotation = 0;
        applyDiscRotation();
        toast('DISC録音完了');
      } else if (targetLocal === 'piano'){
        state.pianoBuffer = buf;
        toast('PIANO録音完了');
      }
      renderStatuses();
    } catch(err){
      console.error(err);
      toast('録音の読み込みに失敗しました');
    }
  };

  state.mediaRecorder.start(100);
  startRecordTicker(target, target === 'disc' ? DISC_MAX_MS : PIANO_MAX_MS);
  renderStatuses();
}

async function stopRecording(){
  if (!state.activeRecordTarget || !state.mediaRecorder) return;
  stopMediaRecorderIfNeeded();
}

function createDiscSource(offset = 0){
  if (!state.discBuffer) return null;
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.discBuffer;
  src.loop = true;
  src.connect(state.discLoopGain);
  src.start(0, wrap(offset, state.discBuffer.duration));
  return src;
}

function currentDiscOffset(){
  if (!state.discBuffer) return 0;
  if (!state.discPlaying || !state.discLoopSource) return wrap(state.discPausedOffset, state.discBuffer.duration);
  return wrap(state.discPausedOffset + (now() - state.discLoopStartTime), state.discBuffer.duration);
}

function startDiscPlayback(offset = null){
  if (!state.discBuffer) return;
  stopDiscPlayback(true);
  const startOffset = offset == null ? state.discPausedOffset : offset;
  state.discLoopSource = createDiscSource(startOffset);
  state.discPausedOffset = wrap(startOffset, state.discBuffer.duration);
  state.discLoopStartTime = now();
  state.discPlaying = true;
  state.discLoopGain.gain.setTargetAtTime(1, now(), 0.01);
  state.discScratchGain.gain.setTargetAtTime(1, now(), 0.01);
  startSpin();
  renderStatuses();
}

function stopDiscPlayback(silent=false){
  if (!state.discBuffer) {
    state.discPlaying = false;
    renderStatuses();
    stopSpin();
    return;
  }
  if (state.discLoopSource){
    state.discPausedOffset = currentDiscOffset();
    try{ state.discLoopSource.stop(); }catch(e){}
    try{ state.discLoopSource.disconnect(); }catch(e){}
    state.discLoopSource = null;
  }
  state.discPlaying = false;
  if (!silent){
    stopSpin();
  }
  renderStatuses();
}

function applyDiscRotation(){
  els.disc.style.transform = `rotate(${state.visualRotation}deg)`;
}

function startSpin(){
  cancelAnimationFrame(state.spinRaf);
  state.lastSpinTs = 0;
  const rpm = 33.3333;
  const degPerSec = rpm * 360 / 60;
  const loop = (ts)=>{
    if (!state.discPlaying || state.scratching){
      state.lastSpinTs = ts;
      state.spinRaf = requestAnimationFrame(loop);
      return;
    }
    if (!state.lastSpinTs) state.lastSpinTs = ts;
    const dt = (ts - state.lastSpinTs) / 1000;
    state.lastSpinTs = ts;
    state.visualRotation += degPerSec * dt;
    applyDiscRotation();
    state.spinRaf = requestAnimationFrame(loop);
  };
  state.spinRaf = requestAnimationFrame(loop);
}

function stopSpin(){
  cancelAnimationFrame(state.spinRaf);
  state.spinRaf = 0;
  state.lastSpinTs = 0;
}

function playScratchGrain(offset, delta){
  if (!state.discBuffer) return;
  const t = now();
  if (t - state.scratchBurstAt < 0.018) return;
  state.scratchBurstAt = t;

  const src = state.audioCtx.createBufferSource();
  src.buffer = state.discBuffer;
  src.loop = false;

  const amp = clamp(Math.abs(delta) / 0.22, 0.14, 1);
  const g = state.audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.11 * amp, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);

  src.playbackRate.value = 1;
  src.connect(g).connect(state.discScratchGain);

  let start = wrap(offset, state.discBuffer.duration);
  let dur = Math.min(0.07, Math.max(0.03, state.discBuffer.duration - 0.001));
  if (start + dur >= state.discBuffer.duration){
    start = Math.max(0, state.discBuffer.duration - dur - 0.001);
  }
  src.start(t, start, dur);
  src.stop(t + dur + 0.03);
}

function getAngleFromPointer(e){
  const rect = els.disc.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  return Math.atan2(e.clientY - cy, e.clientX - cx);
}

function stopDiscScratchOnly(){
  state.scratching = false;
  state.scratchPointerId = null;
}

function onDiscPointerDown(e){
  if (!state.discBuffer) return;
  e.preventDefault();
  els.disc.setPointerCapture(e.pointerId);
  state.scratching = true;
  state.scratchPointerId = e.pointerId;
  state.scratchPrevAngle = getAngleFromPointer(e);
  state.scratchPos = currentDiscOffset();
  state.discLoopGain.gain.setTargetAtTime(0.0001, now(), 0.01);
}

function onDiscPointerMove(e){
  if (!state.scratching || e.pointerId !== state.scratchPointerId || !state.discBuffer) return;
  e.preventDefault();
  const a = getAngleFromPointer(e);
  let d = normalizeAngleDelta(a - state.scratchPrevAngle);
  state.scratchPrevAngle = a;

  d = clamp(d, -0.7, 0.7);
  const dur = state.discBuffer.duration;
  const shift = (d / (Math.PI * 2)) * dur;
  state.scratchPos = wrap(state.scratchPos + shift, dur);
  state.discPausedOffset = state.scratchPos;

  state.visualRotation += d * 180 / Math.PI;
  applyDiscRotation();

  playScratchGrain(state.scratchPos, d);
}

function onDiscPointerEnd(e){
  if (!state.scratching || e.pointerId !== state.scratchPointerId) return;
  e.preventDefault();
  stopDiscScratchOnly();
  if (state.discPlaying){
    startDiscPlayback(state.scratchPos);
  } else {
    state.discLoopGain.gain.setTargetAtTime(1, now(), 0.01);
  }
}

function semitoneRate(semi){
  return Math.pow(2, semi / 12);
}

function triggerPiano(semi){
  if (!state.pianoBuffer || !state.audioCtx) return;
  const t = now();
  const src = state.audioCtx.createBufferSource();
  src.buffer = state.pianoBuffer;
  src.playbackRate.value = semitoneRate(semi);

  const g = state.audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.95, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + Math.min(2.2, Math.max(0.28, state.pianoBuffer.duration * 0.85)));

  src.connect(g).connect(state.pianoBus);
  src.start(t, 0);
  src.stop(t + Math.min(2.5, state.pianoBuffer.duration * 1.2));
}

function buildKeys(){
  WHITE_NOTES.forEach((note)=>{
    const btn = document.createElement('button');
    btn.className = 'white-key';
    btn.dataset.semitone = note.semitone;
    btn.addEventListener('pointerdown', async (e)=>{
      e.preventDefault();
      await initAudioIfNeeded();
      btn.classList.add('active');
      triggerPiano(note.semitone);
    });
    btn.addEventListener('pointerup', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointercancel', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointerleave', ()=>btn.classList.remove('active'));
    els.whiteKeys.appendChild(btn);
  });

  BLACK_NOTES.forEach((note)=>{
    const btn = document.createElement('button');
    btn.className = 'black-key';
    btn.style.left = `${note.left}%`;
    btn.dataset.semitone = note.semitone;
    btn.addEventListener('pointerdown', async (e)=>{
      e.preventDefault();
      await initAudioIfNeeded();
      btn.classList.add('active');
      triggerPiano(note.semitone);
    });
    btn.addEventListener('pointerup', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointercancel', ()=>btn.classList.remove('active'));
    btn.addEventListener('pointerleave', ()=>btn.classList.remove('active'));
    els.blackLayer.appendChild(btn);
  });
}

function hookUI(){
  els.startBtn.addEventListener('click', async ()=>{
    try{
      await initAudioIfNeeded();
      await prepareMic();
      els.boot.style.display = 'none';
      toast('マイク準備完了');
    } catch(err){
      console.error(err);
      toast('マイク許可を確認してください');
    }
  });

  els.btnDiscRec.addEventListener('click', async ()=>{
    try{
      await startRecording('disc');
    } catch(err){
      console.error(err);
      toast('DISC録音を開始できませんでした');
    }
  });

  els.btnPianoRec.addEventListener('click', async ()=>{
    try{
      await startRecording('piano');
    } catch(err){
      console.error(err);
      toast('PIANO録音を開始できませんでした');
    }
  });

  els.btnDiscPlay.addEventListener('click', async ()=>{
    try{
      await initAudioIfNeeded();
      if (!state.discBuffer) return;
      startDiscPlayback(currentDiscOffset());
    } catch(err){
      console.error(err);
    }
  });

  els.btnDiscStop.addEventListener('click', ()=>{
    stopDiscPlayback();
  });

  els.discVol.addEventListener('input', ()=>{
    state.discVol = Number(els.discVol.value) / 100;
    els.discVolValue.textContent = `${els.discVol.value}%`;
    if (state.discBus) state.discBus.gain.setTargetAtTime(state.discVol, now(), 0.01);
  });

  els.pianoVol.addEventListener('input', ()=>{
    state.pianoVol = Number(els.pianoVol.value) / 100;
    els.pianoVolValue.textContent = `${els.pianoVol.value}%`;
    if (state.pianoBus) state.pianoBus.gain.setTargetAtTime(state.pianoVol, now(), 0.01);
  });

  els.disc.addEventListener('pointerdown', onDiscPointerDown);
  els.disc.addEventListener('pointermove', onDiscPointerMove);
  window.addEventListener('pointerup', onDiscPointerEnd);
  window.addEventListener('pointercancel', onDiscPointerEnd);
  window.addEventListener('blur', ()=>{
    stopDiscScratchOnly();
  });

  document.addEventListener('visibilitychange', ()=>{
    if (document.hidden){
      stopMediaRecorderIfNeeded();
    }
  });
}

function init(){
  buildKeys();
  hookUI();
  renderStatuses();
}
init();
</script>
</body>
</html>
